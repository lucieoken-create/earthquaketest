<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something Big is Coming to Switzerland</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap');

    :root {
      --deep-magma: #1A0A00;
      --dark-earth: #2E1503;
      --scorched: #3D1F08;
      --lava-burst: #FF4D00;
      --ember-glow: #FFB347;
      --fault-line: #FFEE88;
      --quake-coral: #FF6B6B;
      --ash-white: #FFF3E0;
      --cracked-clay: #4A3728;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--deep-magma);
      color: var(--ash-white);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Lava crack background effect */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(255, 77, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 179, 71, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(61, 31, 8, 0.5) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Seismic grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 77, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 77, 0, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 20px 32px;
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--lava-burst);
      color: #fff;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 12px 24px;
      border-radius: 4px;
      border: 2px solid transparent;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .contact-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }

    .contact-btn:hover {
      background: var(--ember-glow);
      color: var(--deep-magma);
      transform: translateY(-2px);
    }

    .contact-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      gap: 0;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      margin-bottom: 56px;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ember-glow);
      background: rgba(255, 179, 71, 0.12);
      border: 1px solid rgba(255, 179, 71, 0.3);
      padding: 6px 16px;
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .hero-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.8rem, 8vw, 7rem);
      line-height: 1.0;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--fault-line);
      text-shadow:
        0 0 40px rgba(255, 238, 136, 0.25),
        4px 4px 0px var(--scorched);
      max-width: 900px;
    }

    .hero-title span {
      color: var(--lava-burst);
      text-shadow:
        0 0 40px rgba(255, 77, 0, 0.4),
        4px 4px 0px var(--cracked-clay);
    }

    /* ── SEISMOGRAPH LINE ── */
    .seismograph {
      width: min(500px, 90vw);
      height: 40px;
      margin: 0 auto 56px;
      overflow: hidden;
    }

    .seismograph svg {
      width: 100%;
      height: 100%;
    }

    /* ── COUNTDOWN ── */
    .countdown-wrapper {
      margin-bottom: 56px;
      width: 100%;
      max-width: 900px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      width: 100%;
    }

    .countdown-unit {
      background: var(--dark-earth);
      border: 2px solid var(--cracked-clay);
      border-radius: 8px;
      padding: 28px 16px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .countdown-unit::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--lava-burst), var(--ember-glow), var(--fault-line));
    }

    .countdown-unit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,77,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .countdown-unit:hover {
      border-color: var(--lava-burst);
    }

    .countdown-number {
      font-family: 'Anton', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 1;
      color: var(--lava-burst);
      text-shadow:
        0 0 30px rgba(255, 77, 0, 0.5),
        0 0 60px rgba(255, 77, 0, 0.2);
      display: block;
      position: relative;
      z-index: 1;
      transition: color 0.2s;
      font-variant-numeric: tabular-nums;
    }

    .countdown-number.tick {
      animation: numTick 0.15s ease-out;
    }

    @keyframes numTick {
      0%   { transform: scale(1.15) translateY(-4px); color: var(--fault-line); }
      100% { transform: scale(1) translateY(0); color: var(--lava-burst); }
    }

    .countdown-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ember-glow);
      margin-top: 8px;
      position: relative;
      z-index: 1;
    }

    .countdown-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 28px;
    }

    .countdown-separator span {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2rem, 5vw, 4rem);
      color: var(--scorched);
      line-height: 1;
      animation: colonBlink 1s step-end infinite;
    }

    @keyframes colonBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── TAGLINE ── */
    .tagline {
      text-align: center;
    }

    .tagline-text {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ember-glow);
    }

    .tagline-text .wave-char {
      display: inline-block;
      animation: waveFloat 2s ease-in-out infinite;
    }

    @keyframes waveFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    /* ── RICHTER SCALE ── */
    .richter {
      margin-top: 48px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .richter-bar {
      width: 6px;
      border-radius: 3px;
      background: var(--lava-burst);
      animation: richterPulse 1.2s ease-in-out infinite;
    }

    .richter-bar:nth-child(1)  { height: 12px; animation-delay: 0.0s; }
    .richter-bar:nth-child(2)  { height: 20px; animation-delay: 0.1s; }
    .richter-bar:nth-child(3)  { height: 32px; animation-delay: 0.2s; }
    .richter-bar:nth-child(4)  { height: 44px; animation-delay: 0.3s; }
    .richter-bar:nth-child(5)  { height: 56px; animation-delay: 0.4s; background: var(--ember-glow); }
    .richter-bar:nth-child(6)  { height: 44px; animation-delay: 0.5s; }
    .richter-bar:nth-child(7)  { height: 32px; animation-delay: 0.6s; }
    .richter-bar:nth-child(8)  { height: 20px; animation-delay: 0.7s; }
    .richter-bar:nth-child(9)  { height: 12px; animation-delay: 0.8s; }

    @keyframes richterPulse {
      0%, 100% { transform: scaleY(1);   opacity: 0.7; }
      50%       { transform: scaleY(1.5); opacity: 1;   }
    }

    /* ── CRACK PARTICLES ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--lava-burst);
      opacity: 0;
    }

    /* ── SHAKE ANIMATIONS ── */
    @keyframes pageShake {
      0%  { transform: translate(0, 0) rotate(0deg); }
      10% { transform: translate(-3px, -2px) rotate(-0.3deg); }
      20% { transform: translate(4px, 2px) rotate(0.3deg); }
      30% { transform: translate(-4px, 3px) rotate(-0.2deg); }
      40% { transform: translate(3px, -3px) rotate(0.2deg); }
      50% { transform: translate(-2px, 2px) rotate(-0.1deg); }
      60% { transform: translate(4px, -2px) rotate(0.1deg); }
      70% { transform: translate(-3px, 3px) rotate(-0.2deg); }
      80% { transform: translate(2px, -2px) rotate(0.15deg); }
      90% { transform: translate(-1px, 1px) rotate(0deg); }
      100%{ transform: translate(0, 0) rotate(0deg); }
    }

    @keyframes unitShake {
      0%  { transform: translate(0, 0); }
      15% { transform: translate(-5px, -3px); }
      30% { transform: translate(5px, 3px); }
      45% { transform: translate(-4px, 4px); }
      60% { transform: translate(4px, -4px); }
      75% { transform: translate(-2px, 2px); }
      90% { transform: translate(2px, -1px); }
      100%{ transform: translate(0, 0); }
    }

    body.shaking {
      animation: pageShake 0.6s ease-in-out;
    }

    .countdown-unit.shaking {
      animation: unitShake 0.5s ease-in-out;
      border-color: var(--lava-burst) !important;
    }

    /* ── FLASH OVERLAY ── */
    .flash-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 77, 0, 0.06);
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .flash-overlay.active {
      opacity: 1;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      color: var(--cracked-clay);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }
      .countdown-separator {
        display: none;
      }
      nav {
        padding: 16px 20px;
      }
      .contact-btn {
        font-size: 0.8rem;
        padding: 10px 16px;
      }
    }

    @media (max-width: 380px) {
      .countdown {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="flash-overlay" id="flashOverlay"></div>
  <canvas class="particles" id="particleCanvas"></canvas>

  <nav>
    <a class="contact-btn"
       href="https://api.whatsapp.com/send/?phone=17049628876&text=Wow+you+are+so+talented+and+smart+and+beautiful+for+making+this+timer%21&type=phone_number&app_absent=0"
       target="_blank"
       rel="noopener noreferrer">
      <!-- WhatsApp icon -->
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

      </svg>
      Contact
    </a>
  </nav>

  <main>
    <div class="hero">
      <div class="hero-eyebrow">⚠ Seismic Alert — Switzerland</div>
      <h1 class="hero-title">Something big is<br>coming to <span>Switzerland</span></h1>
    </div>

    <div class="seismograph">
      <svg viewBox="0 0 500 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <polyline id="seismoLine"
          points="0,20 30,20 40,18 50,22 60,20 70,15 80,25 90,10 100,30 110,18 120,22 130,20 150,20 160,16 170,24 180,20 200,20 210,8 220,32 230,12 240,28 250,20 270,20 280,18 290,22 300,20 310,14 320,26 330,20 350,20 360,17 370,23 380,20 400,20 410,11 420,29 430,20 450,20 460,18 470,22 480,20 500,20"
          fill="none"
          stroke="#FF4D00"
          stroke-width="1.5"
          stroke-linejoin="round"
          opacity="0.6"
        />
      </svg>
    </div>

    <div class="countdown-wrapper">
      <div class="countdown" id="countdown">
        <div class="countdown-unit" id="unit-days">
          <span class="countdown-number" id="days">00</span>
          <div class="countdown-label">Days</div>
        </div>

        <div class="countdown-unit" id="unit-hours">
          <span class="countdown-number" id="hours">00</span>
          <div class="countdown-label">Hours</div>
        </div>

        <div class="countdown-unit" id="unit-minutes">
          <span class="countdown-number" id="minutes">00</span>
          <div class="countdown-label">Minutes</div>
        </div>

        <div class="countdown-unit" id="unit-seconds">
          <span class="countdown-number" id="seconds">00</span>
          <div class="countdown-label">Seconds</div>
        </div>
      </div>
    </div>

    <div class="tagline">
      <div class="tagline-text" id="taglineText">Countdown to the big tickle.</div>
    </div>

    <div class="richter">
      <div class="richter-bar"></div>
      <div class="richter-bar"></div>
      <div class="richter-bar"></div>
      <div class="richter-bar"></div>
      <div class="richter-bar"></div>
      <div class="richter-bar"></div>
      <div class="richter-bar"></div>
      <div class="richter-bar"></div>
      <div class="richter-bar"></div>
    </div>
  </main>

  <footer>
    © 2026 · RICHTER SCALE ENTERTAINMENT · SWITZERLAND EDITION
  </footer>

  <script>
    // ── TARGET DATE: April 27, Switzerland time (Europe/Zurich) ──
    const TARGET = new Date('2026-04-27T00:00:00+02:00');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    // Track previous values to animate on change
    const prev = { days: -1, hours: -1, minutes: -1, seconds: -1 };

    function updateCountdown() {
      const now  = Date.now();
      const diff = TARGET - now;

      if (diff <= 0) {
        document.getElementById('days').textContent    = '00';
        document.getElementById('hours').textContent   = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        document.querySelector('.hero-title').innerHTML = 'The big tickle<br>has <span>arrived!</span>';
        return;
      }

      const days    = Math.floor(diff / 86400000);
      const hours   = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000)  / 60000);
      const seconds = Math.floor((diff % 60000)    / 1000);

      function setUnit(id, val, key) {
        const el = document.getElementById(id);
        const s  = pad(val);
        if (val !== prev[key]) {
          el.textContent = s;
          el.classList.remove('tick');
          void el.offsetWidth; // reflow
          el.classList.add('tick');
          prev[key] = val;
        }
      }

      setUnit('days',    days,    'days');
      setUnit('hours',   hours,   'hours');
      setUnit('minutes', minutes, 'minutes');
      setUnit('seconds', seconds, 'seconds');
    }

    // Run immediately and every second
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ── SHAKE ENGINE ──
    const units    = document.querySelectorAll('.countdown-unit');
    const body     = document.body;
    const flash    = document.getElementById('flashOverlay');

    function triggerShake() {
      // Shake the whole page
      body.classList.remove('shaking');
      void body.offsetWidth;
      body.classList.add('shaking');

      // Flash
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 120);

      // Stagger-shake each unit
      units.forEach((u, i) => {
        setTimeout(() => {
          u.classList.remove('shaking');
          void u.offsetWidth;
          u.classList.add('shaking');
        }, i * 60);
      });

      // Emit particles
      emitParticles(12);

      // Remove body shake class after animation
      body.addEventListener('animationend', () => body.classList.remove('shaking'), { once: true });
    }

    // Shake every 4–7 seconds randomly
    function scheduleNextShake() {
      const delay = 4000 + Math.random() * 3000;
      setTimeout(() => {
        triggerShake();
        scheduleNextShake();
      }, delay);
    }
    scheduleNextShake();

    // ── PARTICLE SYSTEM ──
    const canvas = document.getElementById('particleCanvas');
    const ctx    = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
      constructor() {
        this.x  = Math.random() * canvas.width;
        this.y  = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6 - 2;
        this.life   = 1;
        this.decay  = 0.03 + Math.random() * 0.04;
        this.size   = 2 + Math.random() * 4;
        const colors = ['#FF4D00', '#FFB347', '#FFEE88', '#FF6B6B'];
        this.color  = colors[Math.floor(Math.random() * colors.length)];
      }
      update() {
        this.x    += this.vx;
        this.y    += this.vy;
        this.vy   += 0.15; // gravity
        this.life -= this.decay;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle   = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur  = 6;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function emitParticles(count) {
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ── ANIMATED SEISMOGRAPH LINE ──
    const seismoLine = document.getElementById('seismoLine');
    let seismoOffset = 0;

    function animateSeismo() {
      seismoOffset -= 0.8;
      seismoLine.style.strokeDasharray  = '600';
      seismoLine.style.strokeDashoffset = seismoOffset;
      requestAnimationFrame(animateSeismo);
    }
    animateSeismo();

    // ── TAGLINE WAVE ANIMATION ──
    const taglineEl   = document.getElementById('taglineText');
    const taglineText = 'Countdown to the big tickle.';

    taglineEl.innerHTML = taglineText
      .split('')
      .map((ch, i) => {
        if (ch === ' ') return ' ';
        return `<span class="wave-char" style="animation-delay:${i * 0.05}s">${ch}</span>`;
      })
      .join('');
  </script>
</body>
